# Tag-triggered release: build + test + installer -> DRAFT GitHub Release with the
# UNSIGNED MSI attached. Signing cannot run in CI (Certum SimplySign is bound to its
# local desktop app), so the maintainer finishes the release locally with
# installer/sign-release.ps1, which signs the asset and publishes the draft.
# See installer/README.md for the full runbook.
name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build, e.g. 0.1.0 or 0.2.0-rc.1 (leading v allowed)'
        required: true
        type: string
      prerelease:
        description: 'Mark the draft release as a prerelease'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

defaults:
  run:
    shell: pwsh

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Resolve version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_PRERELEASE: ${{ inputs.prerelease }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          $version = if ($env:EVENT_NAME -eq 'workflow_dispatch') { $env:INPUT_VERSION } else { $env:REF_NAME }
          $version = $version.TrimStart('v')
          if ($version -notmatch '^\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?$') {
            Write-Error "Version '$version' is not X.Y.Z or X.Y.Z-prerelease."
            exit 1
          }
          $prerelease = if ($env:EVENT_NAME -eq 'workflow_dispatch') { $env:INPUT_PRERELEASE -eq 'true' } else { $version.Contains('-') }
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT
          "prerelease=$($prerelease.ToString().ToLower())" >> $env:GITHUB_OUTPUT

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      # Red tests stop the job here: no installer is built, no draft release is created.
      - name: Test
        run: dotnet test Ficsit.Schematics.Tests/Ficsit.Schematics.Tests.csproj --configuration Release

      - name: Install MAUI workload
        run: dotnet workload install maui-windows

      - name: Build installer
        run: ./installer/build-installer.ps1 -Version '${{ steps.version.outputs.version }}'

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
          PRERELEASE: ${{ steps.version.outputs.prerelease }}
        run: |
          # A re-run replaces a stale draft for the same tag; a published release is never touched.
          $existing = gh release view $env:TAG --json isDraft 2>$null
          if ($LASTEXITCODE -eq 0) {
            if (($existing | ConvertFrom-Json).isDraft) {
              Write-Host "Deleting stale draft for $env:TAG"
              gh release delete $env:TAG --yes
              if ($LASTEXITCODE -ne 0) { exit 1 }
            }
            else {
              Write-Error "A published release for $env:TAG already exists."
              exit 1
            }
          }
          $createArgs = @(
            $env:TAG,
            "installer/out/FicsitSchematics-Setup-$env:VERSION.msi",
            '--title', "Ficsit.Schematics $env:TAG",
            '--draft',
            '--generate-notes',
            '--target', $env:GITHUB_SHA
          )
          if ($env:PRERELEASE -eq 'true') { $createArgs += '--prerelease' }
          gh release create @createArgs
          if ($LASTEXITCODE -ne 0) { exit 1 }
          Write-Host "Draft release created for $env:TAG - run installer/sign-release.ps1 -Tag $env:TAG locally to sign and publish."
